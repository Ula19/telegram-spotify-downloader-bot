services:
  bot:
    build: .
    container_name: spotify_bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      # service_started, не healthy: не блокируем старт бота ожиданием WARP.
      # spotdl — редкий последний рубеж, к моменту вызова WARP уже поднимется.
      warp:
        condition: service_started
    volumes:
      - /tmp/spotify_bot:/tmp/spotify_bot
    restart: unless-stopped
    labels:
      autoheal: "true"

  # Cloudflare WARP — socks5-прокси (порт 9091) только для spotdl-фоллбека:
  # свой exit-IP от Cloudflare, чтобы обойти блокировку YouTube.
  # При бане IP healthcheck упадёт → autoheal перезапустит контейнер (новый IP).
  warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    container_name: spotify_bot_warp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -x socks5://127.0.0.1:9091 -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -q warp=on"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: spotify_bot_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: spotify_bot_autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  postgres-data:
