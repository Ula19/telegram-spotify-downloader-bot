services:
  bot:
    build: .
    container_name: spotify_bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/spotify_bot:/tmp/spotify_bot
    restart: unless-stopped
    labels:
      autoheal: "true"

  postgres:
    image: postgres:16-alpine
    container_name: spotify_bot_postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: spotify_bot_autoheal
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  postgres-data:
